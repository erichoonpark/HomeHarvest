name: Sync Root index.html for GitHub Pages

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install Poetry
        run: pipx install poetry

      - name: Install project dependencies
        run: poetry install --no-interaction --no-ansi

      - name: Build dashboard publish bundle
        run: bash ./scripts/build_dashboard_publish.sh

      - name: Sync root index.html
        run: cp publish/index.html index.html

      - name: Commit updated root index
        run: |
          if git diff --quiet -- index.html; then
            echo "No changes to index.html"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "chore: sync root index.html from publish output"
          git push
